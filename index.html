<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle da Viatura do Comando - BABR</title>
<link rel="stylesheet" href="style.css">
<script defer src="app.js"></script>
</head>
<body>
<div id="loader">Carregando...</div>
<div id="toast"></div>
<header><img src="assets/babr.png" style="height:70px"><h1>Controle da Viatura do Comando</h1><p>Base Aérea de Brasília</p></header>
<nav>
<button data-page="calendario">Calendário</button>
<button data-page="nova">Nova Reserva</button>
<button data-page="minhas">Minhas Reservas</button>
<button data-page="sobre">Sobre</button>
</nav>
<main>
<section id="pagina-calendario" class="page">
<button onclick="mesAnterior()">&lt;</button><span id="tituloCalendario"></span><button onclick="proximoMes()">&gt;</button>
<div id="calendario"></div>
<h3>Reservas do dia</h3><div id="listaDia"></div>
</section>
<section id="pagina-nova" class="page" style="display:none">
<select id="militar"></select>
<input id="setor" readonly>
<select id="tipoMissao"></select>
<input type="date" id="data">
<input type="time" id="horaInicio">
<input type="time" id="horaFim">
<textarea id="observacoes"></textarea>
<button onclick="salvarReserva()">Salvar Reserva</button>
</section>
<section id="pagina-minhas" class="page" style="display:none">
<table><thead><tr><th>Data</th><th>Início</th><th>Fim</th><th>Militar</th><th>Missão</th><th>Status</th><th></th></tr></thead><tbody id="tabelaReservas"></tbody></table>
</section>
<section id="pagina-sobre" class="page" style="display:none"><p>Sistema BABR.</p></section>
</main>
<script>
document.querySelectorAll("nav button").forEach(b=>b.onclick=()=>{
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById("pagina-"+b.dataset.page).style.display="block";
});
</script>
</body>
</html>
